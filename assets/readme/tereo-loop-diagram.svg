<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1520" viewBox="0 0 1200 1520" role="img" aria-labelledby="title desc">
  <title id="title">TEREO loop diagram</title>
  <desc id="desc">A compact vertical diagram of the TEREO loop. Freeze one topic and one fixed proof, run tereo prove to record a baseline if missing, make one small change, run tereo prove again against baseline, measure gain noise and confidence, judge keep hold or drop, write a receipt, then loop for the same topic or restart for a new topic.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8.6" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#1f2328"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #f6f8fa; stroke: #1f2328; stroke-width: 1.5; }
      .judge { fill: #ffffff; stroke: #1f2328; stroke-width: 1.8; }
      .receipt { fill: #f6f8fa; stroke: #1f2328; stroke-width: 1.5; }
      .loopTag { fill: #ffffff; stroke: #d0d7de; stroke-width: 1.2; }
      .chipKeep { fill: #dcfce7; stroke: #166534; stroke-width: 1.1; }
      .chipHold { fill: #fef3c7; stroke: #92400e; stroke-width: 1.1; }
      .chipDrop { fill: #fee2e2; stroke: #991b1b; stroke-width: 1.1; }
      .ink { fill: #1f2328; }
      .muted { fill: #57606a; }
      .keep { fill: #166534; }
      .hold { fill: #92400e; }
      .drop { fill: #991b1b; }
      .rule { stroke: #d8dee4; stroke-width: 1.2; }
      .line { fill: none; stroke: #1f2328; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .link { fill: none; stroke: #1f2328; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .loop { fill: none; stroke: #57606a; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 6 6; marker-end: url(#arrow); }
      .dot { fill: #1f2328; }
      .sans { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .eyebrow { font-size: 13px; letter-spacing: 0.18em; font-weight: 700; }
      .title { font-size: 32px; font-weight: 700; }
      .sub { font-size: 16px; }
      .section { font-size: 12px; letter-spacing: 0.16em; font-weight: 700; }
      .step { font-size: 12px; letter-spacing: 0.14em; font-weight: 700; }
      .head { font-size: 21px; font-weight: 700; }
      .body { font-size: 15px; }
      .monoBody { font-size: 15px; }
      .chip { font-size: 14px; font-weight: 700; }
      .note { font-size: 13px; }
      .loopLabel { font-size: 14px; font-weight: 700; }
      .num { font-size: 12px; font-weight: 700; }
      .receiptHead { font-size: 18px; font-weight: 700; }
      .receiptText { font-size: 17px; font-weight: 600; }
    </style>
  </defs>

  <rect width="1200" height="1520" class="bg"/>

  <text x="88" y="56" class="sans ink eyebrow">TEREO LOOP</text>
  <text x="88" y="98" class="sans ink title">One topic. One fixed check. One readable receipt.</text>
  <text x="88" y="126" class="sans muted sub">Freeze the proof, compare against baseline, then keep, hold, or drop.</text>
  <line x1="88" y1="150" x2="1112" y2="150" class="rule"/>

  <g transform="translate(360 190)">
    <circle cx="-44" cy="36" r="16" fill="#ffffff" stroke="#1f2328" stroke-width="1.4"/>
    <text x="-44" y="40" text-anchor="middle" class="sans muted num">1-2</text>
    <rect width="480" height="72" rx="14" class="box"/>
    <text x="240" y="32" text-anchor="middle" class="sans ink head">Freeze topic and proof</text>
    <text x="240" y="54" text-anchor="middle" class="mono muted monoBody">promise  scope  check</text>
  </g>

  <g transform="translate(360 330)">
    <circle cx="-44" cy="36" r="16" fill="#ffffff" stroke="#1f2328" stroke-width="1.4"/>
    <text x="-44" y="40" text-anchor="middle" class="sans muted num">3</text>
    <rect width="480" height="72" rx="14" class="box"/>
    <text x="240" y="32" text-anchor="middle" class="mono ink head">tereo prove</text>
    <text x="240" y="54" text-anchor="middle" class="sans muted body">baseline if missing</text>
  </g>

  <g transform="translate(360 470)">
    <circle cx="-44" cy="36" r="16" fill="#ffffff" stroke="#1f2328" stroke-width="1.4"/>
    <text x="-44" y="40" text-anchor="middle" class="sans muted num">4</text>
    <rect width="480" height="72" rx="14" class="box"/>
    <text x="240" y="43" text-anchor="middle" class="sans ink head">Make one small change</text>
  </g>

  <g transform="translate(360 610)">
    <circle cx="-44" cy="36" r="16" fill="#ffffff" stroke="#1f2328" stroke-width="1.4"/>
    <text x="-44" y="40" text-anchor="middle" class="sans muted num">5</text>
    <rect width="480" height="72" rx="14" class="box"/>
    <text x="240" y="32" text-anchor="middle" class="mono ink head">tereo prove</text>
    <text x="240" y="54" text-anchor="middle" class="sans muted body">compare against baseline</text>
  </g>

  <g transform="translate(360 750)">
    <circle cx="-44" cy="36" r="16" fill="#ffffff" stroke="#1f2328" stroke-width="1.4"/>
    <text x="-44" y="40" text-anchor="middle" class="sans muted num">6</text>
    <rect width="480" height="72" rx="14" class="box"/>
    <text x="240" y="32" text-anchor="middle" class="sans ink head">Measure</text>
    <text x="240" y="54" text-anchor="middle" class="mono muted monoBody">gain  noise  confidence</text>
  </g>

  <path d="M 600 262 V 330" class="line"/>
  <path d="M 600 402 V 470" class="line"/>
  <path d="M 600 542 V 610" class="line"/>
  <path d="M 600 682 V 750" class="line"/>

  <g transform="translate(470 900)">
    <rect width="260" height="96" rx="18" class="judge"/>
    <text x="130" y="30" text-anchor="middle" class="sans muted step">7-9</text>
    <text x="130" y="58" text-anchor="middle" class="sans ink head">Judge</text>
    <text x="130" y="80" text-anchor="middle" class="mono muted monoBody">gain &gt; noise ?</text>
  </g>

  <path d="M 600 822 V 900" class="line"/>
  <path d="M 600 996 V 1070" class="link"/>
  <circle cx="600" cy="1070" r="4.2" class="dot"/>

  <g transform="translate(180 1146)">
    <rect width="136" height="34" rx="10" class="chipKeep"/>
    <text x="68" y="23" text-anchor="middle" class="mono keep chip">KEEP</text>
  </g>

  <g transform="translate(532 1146)">
    <rect width="136" height="34" rx="10" class="chipHold"/>
    <text x="68" y="23" text-anchor="middle" class="mono hold chip">HOLD</text>
  </g>

  <g transform="translate(884 1146)">
    <rect width="136" height="34" rx="10" class="chipDrop"/>
    <text x="68" y="23" text-anchor="middle" class="mono drop chip">DROP</text>
  </g>

  <path d="M 600 1070 C 530 1070 420 1098 248 1132" class="line"/>
  <path d="M 600 1070 V 1132" class="line"/>
  <path d="M 600 1070 C 670 1070 780 1098 952 1132" class="line"/>

  <g transform="translate(256 1300)">
    <rect width="688" height="58" rx="14" class="receipt"/>
    <line x1="438" y1="12" x2="438" y2="46" class="rule"/>
    <text x="26" y="37" class="sans ink receiptText">receipt: verdict, scorecard, confidence</text>
    <text x="466" y="37" class="sans ink receiptHead">keep =&gt; next baseline</text>
  </g>

  <path d="M 248 1180 V 1210 C 248 1232 382 1244 600 1244" class="link"/>
  <path d="M 600 1180 V 1244" class="link"/>
  <path d="M 952 1180 V 1210 C 952 1232 818 1244 600 1244" class="link"/>
  <circle cx="600" cy="1244" r="4.2" class="dot"/>
  <path d="M 600 1244 V 1300" class="line"/>

  <path d="M 944 1329 C 1050 1329 1076 1228 1076 1012 L 1076 506 C 1076 458 998 458 840 506" class="loop"/>
  <g transform="translate(1018 676)">
    <rect width="116" height="30" rx="10" class="loopTag"/>
    <text x="58" y="20" text-anchor="middle" class="sans muted loopLabel">same topic</text>
  </g>

  <path d="M 256 1329 C 150 1329 124 1228 124 1012 L 124 224 C 124 180 218 180 360 190" class="loop"/>
  <g transform="translate(72 580)">
    <rect width="104" height="30" rx="10" class="loopTag"/>
    <text x="52" y="20" text-anchor="middle" class="sans muted loopLabel">new topic</text>
  </g>
</svg>
